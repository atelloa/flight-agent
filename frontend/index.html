<!DOCTYPE html>
<html>
<head>
    <title>Flight Agent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 24px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .price {
            font-weight: bold;
        }

        .status-message {
            margin: 8px 0 12px 0;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            margin: 8px 0 12px 0;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <h1>Flight Agent</h1>

    <p>UI mínima del agente de monitoreo de vuelos.</p>

    <h2>Estado de la API</h2>
    <p id="api-status" class="status-message">Consultando API...</p>

    <h2>Últimas corridas</h2>
    <p id="runs-status" class="status-message">Cargando corridas...</p>
    <div id="runs-list"></div>

    <h2>Ofertas más baratas</h2>

    <div class="controls">
        <label for="offers-limit">Cantidad por tramo:</label>
        <select id="offers-limit">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select>

        <label>
            <input type="checkbox" id="offers-unique-airline">
            máximo 1 oferta por aerolínea
        </label>
    </div>

    <p id="offers-status" class="status-message">Cargando ofertas...</p>
    <div id="offers-list"></div>

    <h2>Secciones</h2>

    <ul>
        <li><a href="http://127.0.0.1:8000/health">Health JSON</a></li>
        <li><a href="http://127.0.0.1:8000/runs">Runs JSON</a></li>
        <li><a href="http://127.0.0.1:8000/offers/cheapest?window=7d&limit=3">Ofertas más baratas JSON</a></li>
        <li><a href="http://127.0.0.1:8000/review-queue">Review queue JSON</a></li>
    </ul>

<script>
    async function cargarHealth() {
        const statusElement = document.getElementById("api-status");

        statusElement.textContent = "Consultando API...";

        try {
            const response = await fetch("http://127.0.0.1:8000/health");

            if (!response.ok) {
                statusElement.textContent = "API error: status HTTP " + response.status;
                return;
            }

            const data = await response.json();
            statusElement.textContent = "API OK: " + data.status;
        } catch (error) {
            statusElement.textContent = "API error: no se pudo conectar.";
            console.error(error);
        }
    }

    async function cargarRuns() {
        const runsStatus = document.getElementById("runs-status");
        const runsList = document.getElementById("runs-list");

        runsStatus.textContent = "Cargando corridas...";
        runsList.innerHTML = "";

        try {
            const response = await fetch("http://127.0.0.1:8000/runs");

            if (!response.ok) {
                runsStatus.textContent = "Error: la API respondió con status " + response.status;
                return;
            }

            const runs = await response.json();

            if (runs.length === 0) {
                runsStatus.textContent = "No hay corridas registradas.";
                return;
            }

            const ultimasRuns = runs.slice(0, 5);
            runsStatus.textContent = "Corridas cargadas: " + ultimasRuns.length;

            const table = document.createElement("table");

            const thead = document.createElement("thead");
            thead.innerHTML = `
                <tr>
                    <th>Run ID</th>
                    <th>Status</th>
                    <th>Duración</th>
                    <th>Fetch mode</th>
                    <th>Claude mode</th>
                    <th>Vuelos</th>
                    <th>Alertas</th>
                    <th>Errores no fatales</th>
                </tr>
            `;
            table.appendChild(thead);

            const tbody = document.createElement("tbody");

            ultimasRuns.forEach(function(run) {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td><a href="run.html?run_id=${run.run_id}">${run.run_id}</a></td>
                    <td>${run.status}</td>
                    <td>${run.duration_seconds}s</td>
                    <td>${run.fetch_mode}</td>
                    <td>${run.claude_mode}</td>
                    <td>${run.flights_found}</td>
                    <td>${run.alerts_generated}</td>
                    <td>${run.recoverable_errors_count}</td>
                `;

                tbody.appendChild(row);
            });

            table.appendChild(tbody);
            runsList.appendChild(table);
        } catch (error) {
            runsStatus.textContent = "Error: no se pudieron cargar las corridas.";
            console.error(error);
        }
    }

    function buildOffersUrl() {
        const limit = document.getElementById("offers-limit").value;
        const uniqueAirline = document.getElementById("offers-unique-airline").checked;

        return "http://127.0.0.1:8000/offers/cheapest?window=7d&limit=" + limit + "&unique_airline=" + uniqueAirline;
    }

    async function cargarOffers() {
        const offersStatus = document.getElementById("offers-status");
        const offersList = document.getElementById("offers-list");

        offersStatus.textContent = "Cargando ofertas...";
        offersList.innerHTML = "";

        try {
            const response = await fetch(buildOffersUrl());

            if (!response.ok) {
                offersStatus.textContent = "Error: la API respondió con status " + response.status;
                return;
            }

            const data = await response.json();

            if (data.routes.length === 0) {
                offersStatus.textContent = "No hay ofertas registradas.";
                return;
            }

            const modo = data.unique_airline ? "1 por aerolínea" : "normal";
            offersStatus.textContent = "Ofertas cargadas por tramos: " + data.routes.length + " | límite: " + data.limit_per_route + " | modo: " + modo;

            data.routes.forEach(function(routeGroup) {
                const routeTitle = document.createElement("h3");
                routeTitle.textContent = routeGroup.route;
                offersList.appendChild(routeTitle);

                const table = document.createElement("table");

                const thead = document.createElement("thead");
                thead.innerHTML = `
                    <tr>
                        <th>Aerolínea</th>
                        <th>Low cost</th>
                        <th>Vuelo</th>
                        <th>Precio</th>
                        <th>Escalas</th>
                        <th>Salida</th>
                        <th>Capturado</th>
                    </tr>
                `;
                table.appendChild(thead);

                const tbody = document.createElement("tbody");

                routeGroup.offers.forEach(function(offer) {
                    const row = document.createElement("tr");
                    const lowCostText = offer.is_low_cost ? "Sí" : "No";

                    row.innerHTML = `
                        <td>${offer.airline}</td>
                        <td>${lowCostText}</td>
                        <td>${offer.flight_number}</td>
                        <td class="price">${offer.price}</td>
                        <td>${offer.stops}</td>
                        <td>${offer.departure_date}</td>
                        <td>${offer.captured_at}</td>
                    `;

                    tbody.appendChild(row);
                });

                table.appendChild(tbody);
                offersList.appendChild(table);
            });
        } catch (error) {
            offersStatus.textContent = "Error: no se pudieron cargar las ofertas.";
            console.error(error);
        }
    }

    document.getElementById("offers-limit").addEventListener("change", cargarOffers);
    document.getElementById("offers-unique-airline").addEventListener("change", cargarOffers);

    cargarHealth();
    cargarRuns();
    cargarOffers();
</script>
</body>
</html>
